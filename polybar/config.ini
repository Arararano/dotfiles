[colors]
background = ${colors.base}
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

 base = #1e1e2e
 mantle = #181825
 crust = #11111b

 text = #cdd6f4
 subtext0 = #a6adc8
 subtext1 = #bac2de

 surface0 = #313244
 surface1 = #45475a
 surface2 = #585b70
 
 overlay0 = #6c7086
 overlay1 = #7f849c
 overlay2 = #9399b2
 

 blue = #89b4fa
 lavender = #b4befe
 sapphire = #74c7ec
 sky = #89dceb
 teal = #94e2d5
 green = #a6e3a1
 yellow = #f9e2af
 peach = #fab387
 maroon = #eba0ac
 red = #f38ba8
 mauve = #cba6f7
 pink = #f5c2e7
 flamingo = #f2cdcd
 rosewater = #f5e0dc

 transparent = #FF00000

[bar/example]
width = 100%
height = 24pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-left-size = 5pt
border-left-color = #00000000

border-top-size = 5pt
border-top-color = #00000000

border-right-size = 5pt
border-right-color = #00000000






# margine-top = 


padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace;2

modules-left = xworkspaces coolthing xwindow
modules-right = filesystem pulseaudio battery xkeyboard cpu memory wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.lavender}
#label-active-underline= ${colors.primary}
label-active-foreground = ${colors.mantle}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/coolthing]
type = custom/text
content = " []= "
content-foreground = ${colors.mantle}
content-background = ${colors.lavender}
[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %mountpoint%%{F-} %percentage_used%%
label-mounted-foreground = ${colors.mauve}
#label-mounted-background = ${colors.lavender}


label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.mauve}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.mauve}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.mauve}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " CPU "
format-prefix-foreground = ${colors.mantle}
format-prefix-background = ${colors.lavender}
# format-prefix-padding = 0pt
label = "%percentage:2%% "
# label-padding = 0pt
label-background = ${colors.lavender}
label-foreground = ${colors.mantle}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = " %ifname% disconnected "
label-disconnected-foreground = ${colors.base}
label-disconnected-background = ${colors.lavender}


[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = " %ifname% %essid% %local_ip% "
label-connected-foreground = ${colors.base}
label-connected-background = ${colors.lavender}

#format-connected = <ramp-signal> %{F#1d1e26}<label-connected>        

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.mauve}


[module/battery]
type = internal/battery

battery = BAT0
adapter = AC


full-at = 99

low-at = 5

poll-interval = 5

label-charging = " Bat+ %percentage%% " 
label-discharging = " Bat %percentage%% "
label-full = " Fully charged "

label-charging-foreground = ${colors.mantle}
label-discharging-foreground = ${colors.mantle}
label-full-foreground = ${colors.mantle}

label-charging-background = ${colors.lavender}
label-discharging-background = ${colors.lavender}
label-full-background = ${colors.lavender}





[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
